<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>FollowFlow – Sales Follow-Up</title>

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-8DMBL9Z2DC"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-8DMBL9Z2DC');
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #f5f7fa;
      --surface: #ffffff;
      --surface2: #f0f4f8;
      --border: #e2e8f0;
      --text: #1e293b;
      --muted: #64748b;
      --blue: #2563eb;
      --blue-light: #60a5fa;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #f59e0b;
      --radius: 12px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -webkit-text-size-adjust: 100%;
    }

    /* ─── LAYOUT ─── */
    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
    }

    /* ─── HEADER ─── */
    .header {
      padding: 12px 16px;
      background: linear-gradient(135deg, #ffffff 0%, #f0f4f8 100%);
      border-bottom: 3px solid var(--blue);
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(30, 41, 59, 0.08);
    }

    .header-title {
      font-size: 16px;
      font-weight: 800;
      color: var(--blue);
      margin-bottom: 8px;
    }

    .nav-tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
      -webkit-overflow-scrolling: touch;
    }

    .nav-tabs::-webkit-scrollbar {
      height: 2px;
    }

    .nav-tabs::-webkit-scrollbar-track {
      background: transparent;
    }

    .nav-tabs::-webkit-scrollbar-thumb {
      background: var(--border);
    }

    .nav-tab {
      padding: 6px 12px;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }

    .nav-tab.active {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }

    .nav-tab:active {
      opacity: 0.8;
    }

    /* ─── MAIN CONTENT ─── */
    .main {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 80px;
      background: var(--bg);
    }

    .main::-webkit-scrollbar {
      width: 4px;
    }

    .main::-webkit-scrollbar-track {
      background: transparent;
    }

    .main::-webkit-scrollbar-thumb {
      background: #cbd5e1;
    }

    /* ─── SECTIONS ─── */
    .section {
      display: none;
      padding: 12px;
    }

    .section.active {
      display: block;
    }

    /* ─── STATS GRID ─── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      text-align: center;
      box-shadow: 0 1px 3px rgba(30, 41, 59, 0.06);
    }

    .stat-value {
      font-size: 18px;
      font-weight: 800;
      color: var(--blue);
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 10px;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
    }

    .stat-card.alert {
      border-color: #fecaca;
      background: #fef2f2;
    }

    .stat-card.alert .stat-value {
      color: var(--red);
    }

    /* ─── SEARCH & FILTER ─── */
    .search-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      width: 100%;
      color: var(--text);
      font-size: 13px;
      margin-bottom: 12px;
    }

    .search-bar::placeholder {
      color: var(--muted);
    }

    /* ─── LEADS LIST ─── */
    .leads-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .lead-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      gap: 10px;
      align-items: flex-start;
      box-shadow: 0 1px 3px rgba(30, 41, 59, 0.06);
    }

    .lead-card:active {
      background: var(--surface2);
      transform: scale(0.98);
    }

    .lead-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--blue), #7c3aed);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 700;
      flex-shrink: 0;
    }

    .lead-info {
      flex: 1;
      min-width: 0;
    }

    .lead-name {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .lead-company {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .lead-status {
      display: inline-block;
      font-size: 9px;
      padding: 2px 8px;
      background: #dbeafe;
      border-radius: 6px;
      color: var(--blue);
      font-weight: 600;
    }

    .lead-meta {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ─── EMPTY STATE ─── */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .empty-state-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }

    .empty-state-text {
      font-size: 12px;
      margin-bottom: 16px;
    }

    /* ─── BUTTONS ─── */
    .btn {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-family: inherit;
    }

    .btn:active {
      transform: scale(0.95);
    }

    .btn-primary {
      background: var(--blue);
      color: #fff;
      box-shadow: 0 2px 8px rgba(37, 99, 235, 0.2);
    }

    .btn-ghost {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-success {
      background: #dcfce7;
      color: #166534;
      border: 1px solid #86efac;
    }

    .btn-small {
      padding: 6px 10px;
      font-size: 11px;
    }

    /* ─── ADD LEAD BUTTON (FLOATING) ─── */
    .fab-container {
      position: fixed;
      bottom: max(16px, calc(var(--safe-bottom) + 16px));
      left: 12px;
      right: 12px;
      z-index: 9999;
      pointer-events: auto;
    }

    .fab {
      width: 100%;
      padding: 14px 16px;
      background: linear-gradient(135deg, var(--blue) 0%, #1d4ed8 100%);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(37, 99, 235, 0.4);
      transition: all 0.2s ease;
    }

    .fab:active {
      box-shadow: 0 2px 8px rgba(37, 99, 235, 0.3);
      transform: scale(0.98);
    }

    /* ─── MODAL ─── */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.3);
      z-index: 10000;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 0;
    }

    .modal.open {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }

    .modal-content {
      background: var(--surface);
      width: 100%;
      margin-top: auto;
      border-radius: 16px 16px 0 0;
      padding: 16px;
      padding-bottom: calc(16px + var(--safe-bottom));
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 -4px 16px rgba(30, 41, 59, 0.1);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .modal-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }

    .modal-close {
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 24px;
      cursor: pointer;
      padding: 0;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .form-group {
      margin-bottom: 12px;
    }

    .form-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .form-input {
      width: 100%;
      padding: 10px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--blue);
    }

    .form-actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    .form-actions .btn {
      flex: 1;
    }

    /* ─── TABLET (769px+) ─── */
    @media (min-width: 769px) {
      .header {
        padding: 16px 24px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .header-title {
        margin-bottom: 0;
        flex: 1;
      }

      .nav-tabs {
        flex: 1;
        justify-content: center;
        padding-bottom: 0;
        overflow: visible;
      }

      .main {
        padding: 24px;
        padding-bottom: 0;
      }

      .section {
        padding: 0;
      }

      .fab-container {
        position: static;
        bottom: auto;
        left: auto;
        right: auto;
        margin-top: 16px;
      }

      .fab {
        width: auto;
        padding: 10px 20px;
      }

      .stats-grid {
        grid-template-columns: repeat(6, 1fr);
        gap: 12px;
      }

      .leads-list {
        max-width: 800px;
      }

      .lead-card {
        padding: 14px;
      }

      .modal-content {
        width: 90%;
        margin: auto;
        max-width: 500px;
        margin-top: 0;
        max-height: 90vh;
        border-radius: 16px;
      }
    }
  </style>
</head>
<body>
  <!-- HEADER -->
  <div class="header">
    <div class="header-title"><i class="fas fa-bolt"></i> FollowFlow</div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="switchTab('dashboard')"><i class="fas fa-chart-line"></i> Dashboard</button>
      <button class="nav-tab" onclick="switchTab('leads')"><i class="fas fa-users"></i> Leads</button>
      <button class="nav-tab" onclick="switchTab('reminders')"><i class="fas fa-bell"></i> Reminders</button>
      <button class="nav-tab" onclick="switchTab('settings')"><i class="fas fa-cog"></i> Settings</button>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main">
    <!-- DASHBOARD -->
    <div class="section active" id="dashboard">
      <div class="stats-grid" id="statsGrid"></div>

      <div style="padding: 0 12px;">
        <div style="font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 12px; text-transform: uppercase;">Recent Leads</div>
      </div>

      <div class="leads-list" id="recentLeads"></div>
    </div>

    <!-- LEADS LIST -->
    <div class="section" id="leads">
      <input type="text" class="search-bar" id="searchInput" placeholder="🔍 Search leads..." oninput="filterLeads()">
      <select class="search-bar" id="filterStatus" onchange="filterLeads()">
        <option value="">All Statuses</option>
      </select>
      <div class="leads-list" id="allLeads"></div>
    </div>

    <!-- REMINDERS -->
    <div class="section" id="reminders">
      <div id="remindersContainer"></div>
    </div>

    <!-- SETTINGS -->
    <div class="section" id="settings">
      <div style="padding: 12px;">
        <div style="margin-bottom: 16px;">
          <button class="btn btn-primary" style="width: 100%;" onclick="document.getElementById('fileInput').click()">
            <i class="fas fa-upload"></i> Import Excel
          </button>
          <input type="file" id="fileInput" accept=".xlsx,.xls" style="display: none;" onchange="importExcel(event)">
        </div>
        <div style="margin-bottom: 16px;">
          <button class="btn btn-ghost" style="width: 100%;" onclick="exportToExcel()">
            <i class="fas fa-download"></i> Export Backup
          </button>
        </div>
        <div style="margin-bottom: 16px;">
          <button class="btn btn-ghost" style="width: 100%;" onclick="generateSample()">
            <i class="fas fa-file-excel"></i> Download Sample
          </button>
        </div>
        <div>
          <div style="font-size: 12px; color: var(--muted); line-height: 1.6;">
            <strong>About:</strong><br>
            FollowFlow helps you never miss a follow-up.<br><br>
            <i class="fas fa-check" style="color: var(--green); margin-right: 6px;"></i>Track leads<br>
            <i class="fas fa-check" style="color: var(--green); margin-right: 6px;"></i>Manage follow-ups<br>
            <i class="fas fa-check" style="color: var(--green); margin-right: 6px;"></i>Monitor deals<br><br>
            Data saved locally on your device.
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ADD LEAD BUTTON (FLOATING) -->
  <div class="fab-container">
    <button class="fab" onclick="openAddLeadModal()">Add Lead</button>
  </div>

  <!-- ADD/EDIT MODAL -->
  <div class="modal" id="leadModal">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-title" id="modalTitle">Add New Lead</div>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>

      <form onsubmit="saveLead(event)">
        <div class="form-group">
          <label class="form-label">Name *</label>
          <input type="text" class="form-input" id="leadName" required>
        </div>

        <div class="form-group">
          <label class="form-label">Company *</label>
          <input type="text" class="form-input" id="leadCompany" required>
        </div>

        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" id="leadEmail">
        </div>

        <div class="form-group">
          <label class="form-label">Role</label>
          <input type="text" class="form-input" id="leadRole">
        </div>

        <div class="form-group">
          <label class="form-label">Status</label>
          <select class="form-input" id="leadStatus"></select>
        </div>

        <div class="form-group">
          <label class="form-label">Deal Value ($)</label>
          <input type="number" class="form-input" id="leadValue" min="0" value="0">
        </div>

        <div class="form-group">
          <label class="form-label">Last Contact</label>
          <input type="date" class="form-input" id="leadLastContact">
        </div>

        <div class="form-group">
          <label class="form-label">Next Follow-Up</label>
          <input type="date" class="form-input" id="leadNextFollowUp">
        </div>

        <div class="form-group">
          <label class="form-label">Notes</label>
          <textarea class="form-input" id="leadNotes" style="resize: vertical; min-height: 80px;"></textarea>
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-ghost" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // ─── DATA MANAGEMENT ───
    let leads = [];
    let statuses = [
      { name: "New", color: "#3b82f6" },
      { name: "Contacted", color: "#22c55e" },
      { name: "Warm", color: "#f97316" },
      { name: "Won", color: "#10b981" },
      { name: "Lost", color: "#ef4444" }
    ];
    let editingId = null;

    const STORAGE_KEY = 'followflow_leads';
    const STATUSES_KEY = 'followflow_statuses';

    // Load data from localStorage
    function loadData() {
      const saved = localStorage.getItem(STORAGE_KEY);
      const savedStatuses = localStorage.getItem(STATUSES_KEY);

      if (saved) leads = JSON.parse(saved);
      if (savedStatuses) statuses = JSON.parse(savedStatuses);

      renderAll();
      updateStatusDropdowns();
    }

    // Save data to localStorage
    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(leads));
      localStorage.setItem(STATUSES_KEY, JSON.stringify(statuses));
    }

    // ─── UI FUNCTIONS ───
    function switchTab(tab) {
      document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));

      document.getElementById(tab).classList.add('active');
      event.target.classList.add('active');

      renderAll();
    }

    function renderAll() {
      renderStats();
      renderRecentLeads();
      renderAllLeads();
      renderReminders();
    }

    function renderStats() {
      const total = leads.length;
      const pipeline = leads.reduce((sum, l) => sum + Number(l.value || 0), 0);
      const won = leads.filter(l => l.status === 'Won').reduce((sum, l) => sum + Number(l.value || 0), 0);
      const overdue = leads.filter(l => l.nextFollowUp && l.nextFollowUp < new Date().toISOString().split('T')[0]).length;
      const today = leads.filter(l => l.nextFollowUp === new Date().toISOString().split('T')[0]).length;

      const stats = [
        { label: 'Total', value: total, icon: '<i class="fas fa-users"></i>' },
        { label: 'Pipeline', value: `$${(pipeline/1000).toFixed(1)}k`, icon: '<i class="fas fa-chart-pie"></i>' },
        { label: 'Won', value: `$${(won/1000).toFixed(1)}k`, icon: '<i class="fas fa-trophy"></i>' },
        { label: 'Today', value: today, icon: '<i class="fas fa-calendar"></i>', alert: today > 0 },
        { label: 'Overdue', value: overdue, icon: '<i class="fas fa-exclamation-triangle"></i>', alert: overdue > 0 },
        { label: 'Sync', value: 'Never', icon: '<i class="fas fa-sync"></i>' }
      ];

      document.getElementById('statsGrid').innerHTML = stats.map(s => `
        <div class="stat-card ${s.alert ? 'alert' : ''}">
          <div style="font-size: 16px; margin-bottom: 4px;">${s.icon}</div>
          <div class="stat-value">${s.value}</div>
          <div class="stat-label">${s.label}</div>
        </div>
      `).join('');
    }

    function renderRecentLeads() {
      const recent = leads.slice(0, 5);
      if (recent.length === 0) {
        document.getElementById('recentLeads').innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon"><i class="fas fa-rocket"></i></div>
            <div class="empty-state-title">Get Started</div>
            <div class="empty-state-text">Add your first lead to track follow-ups</div>
          </div>
        `;
        return;
      }

      document.getElementById('recentLeads').innerHTML = recent.map(l => `
        <div class="lead-card" onclick="editLead(${l.id})">
          <div class="lead-avatar">${l.name.charAt(0).toUpperCase()}</div>
          <div class="lead-info">
            <div class="lead-name">${l.name}</div>
            <div class="lead-company">${l.company}</div>
            <span class="lead-status">${l.status}</span>
            ${l.nextFollowUp ? `<div class="lead-meta"><i class="fas fa-calendar"></i> ${new Date(l.nextFollowUp).toLocaleDateString()}</div>` : ''}
          </div>
        </div>
      `).join('');
    }

    function renderAllLeads() {
      const filtered = leads.filter(l => {
        const search = document.getElementById('searchInput')?.value?.toLowerCase() || '';
        const status = document.getElementById('filterStatus')?.value || '';
        return (l.name.toLowerCase().includes(search) || l.company.toLowerCase().includes(search)) &&
               (!status || l.status === status);
      });

      if (filtered.length === 0) {
        document.getElementById('allLeads').innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon"><i class="fas fa-search"></i></div>
            <div class="empty-state-title">No Leads Found</div>
          </div>
        `;
        return;
      }

      document.getElementById('allLeads').innerHTML = filtered.map(l => `
        <div class="lead-card" onclick="editLead(${l.id})">
          <div class="lead-avatar">${l.name.charAt(0).toUpperCase()}</div>
          <div class="lead-info">
            <div class="lead-name">${l.name}</div>
            <div class="lead-company">${l.company}</div>
            <span class="lead-status">${l.status}</span>
            ${l.value ? `<div class="lead-meta"><i class="fas fa-dollar-sign"></i> $${Number(l.value).toLocaleString()}</div>` : ''}
            ${l.nextFollowUp ? `<div class="lead-meta"><i class="fas fa-calendar"></i> ${new Date(l.nextFollowUp).toLocaleDateString()}</div>` : ''}
          </div>
          <button class="btn btn-small btn-ghost" onclick="event.stopPropagation(); deleteLead(${l.id})"><i class="fas fa-trash"></i></button>
        </div>
      `).join('');
    }

    function renderReminders() {
      const today = new Date().toISOString().split('T')[0];
      const overdue = leads.filter(l => l.nextFollowUp && l.nextFollowUp < today);
      const dueToday = leads.filter(l => l.nextFollowUp === today);
      const upcoming = leads.filter(l => l.nextFollowUp && l.nextFollowUp > today).slice(0, 5);

      let html = '';

      if (overdue.length > 0) {
        html += `<div style="padding: 12px; color: var(--red); font-weight: 600; font-size: 12px; text-transform: uppercase; margin-bottom: 8px;"><i class="fas fa-exclamation-circle"></i> Overdue (${overdue.length})</div>`;
        html += overdue.map(l => `
          <div class="lead-card" onclick="editLead(${l.id})">
            <div class="lead-avatar" style="background: linear-gradient(135deg, #7f1d1d, #991b1b);">${l.name.charAt(0).toUpperCase()}</div>
            <div class="lead-info">
              <div class="lead-name">${l.name}</div>
              <div class="lead-company">${l.company}</div>
              <div class="lead-meta" style="color: var(--red);"><i class="fas fa-calendar"></i> Due ${new Date(l.nextFollowUp).toLocaleDateString()}</div>
            </div>
          </div>
        `).join('');
      }

      if (dueToday.length > 0) {
        html += `<div style="padding: 12px; color: var(--yellow); font-weight: 600; font-size: 12px; text-transform: uppercase; margin-bottom: 8px; margin-top: 8px;"><i class="fas fa-calendar"></i> Due Today (${dueToday.length})</div>`;
        html += dueToday.map(l => `
          <div class="lead-card" onclick="editLead(${l.id})">
            <div class="lead-avatar">${l.name.charAt(0).toUpperCase()}</div>
            <div class="lead-info">
              <div class="lead-name">${l.name}</div>
              <div class="lead-company">${l.company}</div>
              <div class="lead-meta" style="color: var(--yellow);"><i class="fas fa-clock"></i> Follow up today</div>
            </div>
          </div>
        `).join('');
      }

      if (upcoming.length > 0) {
        html += `<div style="padding: 12px; color: var(--muted); font-weight: 600; font-size: 12px; text-transform: uppercase; margin-bottom: 8px; margin-top: 8px;"><i class="fas fa-list"></i> Upcoming</div>`;
        html += upcoming.map(l => `
          <div class="lead-card" onclick="editLead(${l.id})">
            <div class="lead-avatar">${l.name.charAt(0).toUpperCase()}</div>
            <div class="lead-info">
              <div class="lead-name">${l.name}</div>
              <div class="lead-company">${l.company}</div>
              <div class="lead-meta"><i class="fas fa-calendar"></i> ${new Date(l.nextFollowUp).toLocaleDateString()}</div>
            </div>
          </div>
        `).join('');
      }

      if (!html) {
        html = `
          <div class="empty-state">
            <div class="empty-state-icon"><i class="fas fa-check-circle"></i></div>
            <div class="empty-state-title">All Caught Up!</div>
          </div>
        `;
      }

      document.getElementById('remindersContainer').innerHTML = html;
    }

    function filterLeads() {
      renderAllLeads();
    }

    function updateStatusDropdowns() {
      const statusSelects = document.querySelectorAll('[id$="Status"]');
      const options = statuses.map(s => `<option value="${s.name}">${s.name}</option>`).join('');

      statusSelects.forEach(select => {
        select.innerHTML = options;
      });

      const filterSelect = document.getElementById('filterStatus');
      if (filterSelect) {
        filterSelect.innerHTML = '<option value="">All Statuses</option>' + options;
      }
    }

    // ─── MODAL FUNCTIONS ───
    function openAddLeadModal() {
      editingId = null;
      document.getElementById('modalTitle').textContent = 'Add New Lead';
      document.getElementById('leadModal').classList.add('open');
      document.getElementById('leadName').focus();
      clearForm();
    }

    function editLead(id) {
      const lead = leads.find(l => l.id === id);
      if (!lead) return;

      editingId = id;
      document.getElementById('modalTitle').textContent = 'Edit Lead';
      document.getElementById('leadName').value = lead.name;
      document.getElementById('leadCompany').value = lead.company;
      document.getElementById('leadEmail').value = lead.email || '';
      document.getElementById('leadRole').value = lead.role || '';
      document.getElementById('leadStatus').value = lead.status;
      document.getElementById('leadValue').value = lead.value || 0;
      document.getElementById('leadLastContact').value = lead.lastContact || '';
      document.getElementById('leadNextFollowUp').value = lead.nextFollowUp || '';
      document.getElementById('leadNotes').value = lead.notes || '';

      document.getElementById('leadModal').classList.add('open');
    }

    function closeModal() {
      document.getElementById('leadModal').classList.remove('open');
    }

    function clearForm() {
      document.getElementById('leadName').value = '';
      document.getElementById('leadCompany').value = '';
      document.getElementById('leadEmail').value = '';
      document.getElementById('leadRole').value = '';
      document.getElementById('leadStatus').value = statuses[0]?.name || 'New';
      document.getElementById('leadValue').value = 0;
      document.getElementById('leadLastContact').value = '';
      document.getElementById('leadNextFollowUp').value = '';
      document.getElementById('leadNotes').value = '';
    }

    function saveLead(e) {
      e.preventDefault();

      const data = {
        name: document.getElementById('leadName').value.trim(),
        company: document.getElementById('leadCompany').value.trim(),
        email: document.getElementById('leadEmail').value.trim(),
        role: document.getElementById('leadRole').value.trim(),
        status: document.getElementById('leadStatus').value,
        value: Number(document.getElementById('leadValue').value),
        lastContact: document.getElementById('leadLastContact').value,
        nextFollowUp: document.getElementById('leadNextFollowUp').value,
        notes: document.getElementById('leadNotes').value.trim()
      };

      if (!data.name || !data.company) {
        alert('Name and Company are required');
        return;
      }

      if (editingId) {
        const idx = leads.findIndex(l => l.id === editingId);
        leads[idx] = { ...leads[idx], ...data };
      } else {
        leads.unshift({
          id: Date.now(),
          ...data
        });
        gtag('event', 'add_lead', { event_category: 'engagement' });
      }

      saveData();
      renderAll();
      closeModal();
    }

    function deleteLead(id) {
      if (confirm('Delete this lead?')) {
        leads = leads.filter(l => l.id !== id);
        saveData();
        renderAll();
      }
    }

    // ─── EXCEL FUNCTIONS ───

        { Name: 'Sarah Chen', Company: 'Apex Dynamics', Email: 's.chen@apex.com', Role: 'VP Sales', Status: 'Warm', 'Deal Value': 50000, 'Next Follow-Up': new Date().toISOString().split('T')[0] },
        { Name: 'Marcus Webb', Company: 'NovaTech', Email: 'm.webb@nova.com', Role: 'CTO', Status: 'Contacted', 'Deal Value': 75000, 'Next Follow-Up': new Date(Date.now() + 86400000).toISOString().split('T')[0] }

      const ws = XLSX.utils.json_to_sheet(sampleData);

    function importExcel(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const wb = XLSX.read(e.target.result, { type: 'binary' });
          const ws = wb.Sheets[wb.SheetNames[0]];
          const rows = XLSX.utils.sheet_to_json(ws);

          const map = (row, ...keys) => {
            for (const k of keys) {
              const found = Object.keys(row).find(rk => rk.toLowerCase().replace(/[^a-z]/g, '') === k.toLowerCase().replace(/[^a-z]/g, ''));
              if (found && row[found]) return String(row[found]).trim();
            }
            return '';
          };

          const imported = rows.filter(r => map(r, 'name')).map(r => ({
            id: Date.now() + Math.random(),
            name: map(r, 'name', 'fullname'),
            company: map(r, 'company'),
            email: map(r, 'email'),
            role: map(r, 'role', 'title'),
            status: map(r, 'status') || 'New',
            value: Number(map(r, 'value', 'dealvalue')) || 0,
            lastContact: map(r, 'lastcontact') || '',
            nextFollowUp: map(r, 'nextfollowup', 'followup') || '',
            notes: map(r, 'notes') || ''
          }));

          if (imported.length > 0) {
            const merge = confirm(`Import ${imported.length} leads?\n\nOK = Add to existing\nCancel = Replace all`);
            if (merge) leads = [...leads, ...imported];
            else leads = imported;
            saveData();
            renderAll();
            alert(`✅ Imported ${imported.length} leads!`);
          }
        } catch (err) {
          alert('Error reading file: ' + err.message);
        }
      };
      reader.readAsBinaryString(file);
      event.target.value = '';
    }

    function exportToExcel() {
      if (leads.length === 0) {
        alert('No leads to export');
        return;
      }

      const data = leads.map(l => ({
        Name: l.name,
        Company: l.company,
        Email: l.email,
        Role: l.role,
        Status: l.status,
        'Deal Value': l.value,
        'Last Contact': l.lastContact,
        'Next Follow-Up': l.nextFollowUp,
        Notes: l.notes
      }));

      const ws = XLSX.utils.json_to_sheet(data);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Leads');
      XLSX.writeFile(wb, `FollowFlow_Backup_${new Date().toISOString().split('T')[0]}.xlsx`);
      gtag('event', 'export_backup', { event_category: 'engagement' });
    }

    // ─── INIT ───
    loadData();
  </script>
